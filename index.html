<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이미지 호버 테스트</title>
    <style>
        .photo-wrapper {
            position: relative;
            width: 500px;
            height: 500px;
            margin: 20px auto;
            border: 2px solid #ccc;
            /* 요술봉 마우스 커서 */
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" style="font-size: 24px;"><text y="24">🪄</text></svg>'), auto;
        }

        #img-clean, #img-active {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
            z-index: 1;
        }

        #img-active {
            opacity: 0;
        }

        #mouth-trigger {
            position: absolute;
            top: 45%; /* 테스트 이미지에 맞춘 임시 위치 */
            left: 40%;
            width: 20%;
            height: 15%;
            /* 위치 확인용 반투명 빨간색 (위치를 다 맞추면 rgba(255,0,0,0)으로 변경하세요) */
            background: rgba(255, 0, 0, 0); 
            z-index: 2;
        }

        /* 마우스를 올렸을 때의 변화 */
        #mouth-trigger:hover ~ #img-clean {
            opacity: 0;
        }

        #mouth-trigger:hover ~ #img-active {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="photo-wrapper">
        <div id="mouth-trigger"></div>
        
        <img id="img-clean" src="https://www.ehom.co.kr/news/2024/11/12/d5aaca660e8ae9c023e3fdc116b98757114119.png" alt="기본 상태">
        <img id="img-active" src="https://strict-jade-rskjbb0w.edgeone.app/Gemini_Generated_Image_l2atnml2atnml2at.png" alt="막대기 가져간 상태">
    </div>

</body>
</html>
